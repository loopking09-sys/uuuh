<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#6a1b9a">
    <title>NEST OPP - Admin Panel</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        .section-content { display: none; }
        .section-content.active { display: block; }
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 2000;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <div id="loading-overlay"><div class="spinner-border text-primary"></div></div>

    <div id="wrapper">
        <!-- Sidebar (Desktop Only) -->
        <div id="sidebar-wrapper" class="d-none d-lg-block">
            <div class="sidebar-heading text-center">NEST OPP</div>
            <div class="list-group list-group-flush">
                <a href="javascript:void(0)" class="list-group-item active" data-section="dashboard"><i class="fas fa-tachometer-alt me-3"></i> Dashboard</a>
                <a href="javascript:void(0)" class="list-group-item" data-section="entries"><i class="fas fa-users me-3"></i> Entries</a>
                <a href="javascript:void(0)" class="list-group-item" data-section="messages"><i class="fas fa-envelope me-3"></i> Messages</a>
                <a href="javascript:void(0)" class="list-group-item" data-section="admin-number"><i class="fas fa-phone me-3"></i> Admin Number</a>
                <a href="javascript:void(0)" class="list-group-item" data-section="profile"><i class="fas fa-user-circle me-3"></i> Profile</a>
                <a href="javascript:void(0)" class="list-group-item" data-section="password"><i class="fas fa-lock me-3"></i> Password</a>
            </div>
        </div>

        <!-- Main Content -->
        <div id="page-content-wrapper">
            <div id="main-sections">
                <!-- Sections are pre-defined for instant switching -->
                <div id="section-dashboard" class="section-content active"></div>
                <div id="section-messages" class="section-content"></div>
                <div id="section-entries" class="section-content"></div>
                <div id="section-more" class="section-content"></div>
                <div id="section-admin-menu" class="section-content"></div>
                <div id="section-device-detail" class="section-content"></div>
                <div id="section-admin-number" class="section-content"></div>
                <div id="section-profile" class="section-content"></div>
                <div id="section-password" class="section-content"></div>
            </div>
        </div>

        <!-- Bottom Navigation (Mobile Only) -->
        <nav class="bottom-nav d-lg-none">
            <a href="javascript:void(0)" class="nav-item active" data-section="dashboard">
                <i class="fas fa-th-large"></i>
                <span>ALL</span>
            </a>
            <a href="javascript:void(0)" class="nav-item" data-section="messages">
                <i class="fas fa-comment-dots"></i>
                <span>SMS</span>
            </a>
            <a href="javascript:void(0)" class="nav-item" data-section="entries">
                <i class="fas fa-file-alt"></i>
                <span>DATA</span>
            </a>
            <a href="javascript:void(0)" class="nav-item" data-section="more">
                <i class="fas fa-ellipsis-h"></i>
                <span>MORE</span>
            </a>
            <a href="javascript:void(0)" class="nav-item" data-section="admin-menu">
                <i class="fas fa-user"></i>
                <span>ADMIN</span>
            </a>
        </nav>
    </div>

    <!-- Modals -->
    <div class="modal fade" id="commandModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius: 25px;">
                <div class="modal-body p-0" id="command-modal-body"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
